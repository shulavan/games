<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ミュージック・マージャン（レイアウト改訂版）</title>
    <style>
        /* ==========================================
           1. 基本リセットとテーマ設定
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --bg-color: #08120d; /* 深いダークグリーン */
            --panel-bg: rgba(255, 255, 255, 0.04);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8a9b90;
            --cyan: #00ffff;
            --pink: #ff3399;
            --yellow: #ffcc00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* アプリコンテナ（スマホの縦画面アスペクトに固定） */
        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at center, #0e2217 0%, #050a07 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* ==========================================
           2. 相手プレイヤーエリア（上段）
           ========================================== */
        .opponents-section {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .opponent-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .opp-info-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .opp-name {
            font-size: 15px;
            font-weight: bold;
        }

        .opp-title {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .opp-score {
            font-size: 13px;
            font-weight: bold;
            color: var(--cyan);
            margin-top: 2px;
        }

        /* 状況表示用のサークル（5つ） */
        .status-circles {
            display: flex;
            gap: 6px;
        }

        .circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ==========================================
           3. 河（捨牌）エリア（中段・拡張版）
           ========================================== */
        .board-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        /* 山札[■]を完全に排除し、横幅いっぱいに拡張された河 */
        .river-area {
            width: 100%;
            min-height: 120px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 6px;
            background: rgba(0, 0, 0, 0.15);
        }

        /* ==========================================
           4. 持ちカード（手札）＆操作エリア（下段）
           ========================================== */
        .player-hand-section {
            padding: 10px 12px 20px 12px; /* フッターの上に余白 */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* カード操作用のポップアップメニュー（捨てる・詳細） */
        .card-action-menu {
            position: absolute;
            bottom: 105px; /* 手札の上に表示 */
            display: none; /* デフォルト非表示、カード選択時にJSで表示 */
            gap: 8px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.85);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-discard {
            background: var(--pink);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-detail {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 持ちカードコンテナ */
        .hand-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            width: 100%;
            height: 75px;
        }

        /* カードの共通デザイン（レコード/アルバムアート風） */
        .card {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* 選択時のハイライトと押し上げ効果 */
        .card.selected {
            border-color: var(--cyan);
            box-shadow: 0 0 12px var(--cyan);
            transform: translateY(-10px);
        }

        /* アガリボタン（ネオンピンク発光） */
        .agari-btn {
            display: none; /* 条件を満たしたときに表示 */
            background: linear-gradient(90deg, #ff007f, #ff00ff);
            border: 3px solid #fff;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 24px;
            box-shadow: 0 0 15px #ff007f, inset 0 0 8px rgba(255, 255, 255, 0.5);
            cursor: pointer;
            animation: neonPulse 1.5s infinite alternate;
            margin-bottom: 12px;
            z-index: 10;
        }

        @keyframes neonPulse {
            from { transform: scale(1); box-shadow: 0 0 12px #ff007f, 0 0 20px #ff00ff; }
            to { transform: scale(1.05); box-shadow: 0 0 20px #ff007f, 0 0 40px #ff00ff; }
        }

        /* ==========================================
           5. 統合された最下段フッター（新設）
           ========================================== */
        .game-footer {
            height: 55px;
            background-color: rgba(0, 0, 0, 0.8); /* システムトーストが被っても視認可能にする黒背景 */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 20;
        }

        /* 左側：局・親情報 */
        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .footer-round {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .footer-dealer {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* 中央：山札残数（シンプル表示） */
        .footer-center {
            text-align: center;
        }

        .footer-deck {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer-deck-count {
            color: var(--text-primary);
            font-size: 15px;
            font-weight: bold;
        }

        /* 右側：プレイヤー名・持ち点 */
        .footer-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .footer-player-name {
            font-size: 11px;
            font-weight: bold;
            color: var(--pink); /* あなた(Player)のピンクを継承 */
        }

        .footer-player-score {
            font-size: 14px;
            font-weight: bold;
            color: var(--cyan); /* スコアの水色を継承 */
        }

        /* ==========================================
           6. アガリ（ツモ）演出のオーバーレイ
           ========================================== */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* アガリ時に表示 */
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: radial-gradient(circle at center, #112a1d 0%, #06110a 100%);
            border: 2px solid var(--cyan);
            box-shadow: 0 0 30px var(--cyan);
            border-radius: 16px;
            width: 85%;
            padding: 24px;
            text-align: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #fff;
        }

        .modal-subtitle {
            font-size: 16px;
            color: var(--cyan);
            margin-bottom: 18px;
        }

        .modal-hand {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .modal-yaku {
            font-size: 16px;
            color: var(--yellow);
            font-weight: bold;
            margin-bottom: 24px;
        }

        .btn-next {
            background: #198754;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 開発検証用：アガリ状態をシミュレートする切り替えボタン（実機運用時は非表示にしてください） */
        .debug-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 99;
            background: rgba(0,0,0,0.5);
            padding: 6px;
            border-radius: 4px;
        }
        .debug-btn {
            font-size: 9px;
            padding: 3px 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <div class="debug-panel">
            <button class="debug-btn" onclick="toggleAgariButton()">アガリボタン切替</button>
        </div>

        <div class="opponents-section">
            <div class="opponent-card">
                <div class="opp-info-left">
                    <span class="opp-name">レイカ</span>
                    <span class="opp-title">ミリオンコレクター</span>
                    <span class="opp-score">25000</span>
                </div>
                <div class="status-circles">
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div>
                </div>
            </div>
            <div class="opponent-card">
                <div class="opp-info-left">
                    <span class="opp-name">ゴロウ</span>
                    <span class="opp-title">同世代コレクター</span>
                    <span class="opp-score">25000</span>
                </div>
                <div class="status-circles">
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div>
                </div>
            </div>
            <div class="opponent-card">
                <div class="opp-info-left">
                    <span class="opp-name">ケンジ</span>
                    <span class="opp-title">熱血ロック派</span>
                    <span class="opp-score">25000</span>
                </div>
                <div class="status-circles">
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div>
                </div>
            </div>
        </div>

        <div class="board-section">
            <div class="river-area" id="river">
                <div class="card" style="background-image: url('https://picsum.photos/id/101/100/100');" title="捨て牌1"></div>
                <div class="card" style="background-image: url('https://picsum.photos/id/102/100/100');" title="捨て牌2"></div>
                <div class="card" style="background-image: url('https://picsum.photos/id/103/100/100');" title="捨て牌3"></div>
                <div class="card" style="background-image: url('https://picsum.photos/id/104/100/100');" title="捨て牌4"></div>
            </div>
        </div>

        <div class="player-hand-section">
            
            <button class="agari-btn" id="agariBtn" onclick="showAgariModal()">⚡ 完成（アガリ） ⚡</button>

            <div class="card-action-menu" id="actionMenu">
                <button class="btn-discard" onclick="discardSelectedCard()">捨てる</button>
                <button class="btn-detail" onclick="alert('カードの詳細情報を表示します')">詳細</button>
            </div>

            <div class="hand-container" id="playerHand">
                <div class="card" style="background-image: url('https://picsum.photos/id/201/100/100');" onclick="selectCard(this)"></div>
                <div class="card" style="background-image: url('https://picsum.photos/id/202/100/100');" onclick="selectCard(this)"></div>
                <div class="card" style="background-image: url('https://picsum.photos/id/203/100/100');" onclick="selectCard(this)"></div>
                <div class="card" style="background-image: url('https://picsum.photos/id/204/100/100');" onclick="selectCard(this)"></div>
                <div class="card" style="background-image: url('https://picsum.photos/id/205/100/100');" onclick="selectCard(this)"></div>
            </div>
        </div>

        <footer class="game-footer">
            <div class="footer-left">
                <span class="footer-round" id="currentRound">東1局</span>
                <span class="footer-dealer" id="currentDealer">親: あなた</span>
            </div>
            
            <div class="footer-center">
                <span class="footer-deck">山札: <strong class="footer-deck-count" id="deckCount">79</strong>枚</span>
            </div>
            
            <div class="footer-right">
                <span class="footer-player-name">あなた (Player)</span>
                <span class="footer-player-score" id="playerScore">25000 P</span>
            </div>
        </footer>

        <div class="overlay" id="agariOverlay">
            <div class="modal">
                <div class="modal-title">あなたの勝ち（ツモ）</div>
                <div class="modal-subtitle">あなたのアガリ! (+4000点)</div>
                <div class="modal-hand">
                    <div class="card" style="background-image: url('https://picsum.photos/id/201/100/100');"></div>
                    <div class="card" style="background-image: url('https://picsum.photos/id/202/100/100');"></div>
                    <div class="card" style="background-image: url('https://picsum.photos/id/203/100/100');"></div>
                    <div class="card" style="background-image: url('https://picsum.photos/id/204/100/100');"></div>
                    <div class="card" style="background-image: url('https://picsum.photos/id/205/100/100');"></div>
                </div>
                <div class="modal-yaku">すべてミリオンセラー (2翻)</div>
                <button class="btn-next" onclick="closeAgariModal()">次の局へ 💿</button>
            </div>
        </div>

    </div>

    <script>
        let selectedElement = null;

        // カードを選択したときの処理
        function selectCard(element) {
            const menu = document.getElementById('actionMenu');
            
            // すでに同じカードが選択されていた場合は解除
            if (selectedElement === element) {
                element.classList.remove('selected');
                selectedElement = null;
                menu.style.display = 'none';
                return;
            }

            // 他のカードのハイライトをリセット
            const cards = document.querySelectorAll('.hand-container .card');
            cards.forEach(c => c.classList.remove('selected'));

            // 選択したカードをハイライト
            element.classList.add('selected');
            selectedElement = element;

            // ポップアップメニューを表示（位置を手札の中心に調整）
            menu.style.display = 'flex';
        }

        // 選択されたカードを「捨てる」処理（デモ動作）
        function discardSelectedCard() {
            if (!selectedElement) return;

            const river = document.getElementById('river');
            const menu = document.getElementById('actionMenu');

            // 手札からクラスを取り除き、河（捨牌エリア）へ移動
            selectedElement.classList.remove('selected');
            selectedElement.onclick = null; // 河に置かれたカードはクリック対象外にする
            
            // クローンを作成して移動を表現
            const discardedCard = selectedElement.cloneNode(true);
            river.appendChild(discardedCard);

            // 元の手札をDOMから削除
            selectedElement.remove();
            selectedElement = null;
            menu.style.display = 'none';

            // 山札の枚数を1減らす
            const deckCountEl = document.getElementById('deckCount');
            let currentCount = parseInt(deckCountEl.innerText);
            if (currentCount > 0) {
                deckCountEl.innerText = currentCount - 1;
            }
        }

        // デバッグ用：アガリボタン表示・非表示切り替え
        function toggleAgariButton() {
            const agariBtn = document.getElementById('agariBtn');
            if (agariBtn.style.display === 'block') {
                agariBtn.style.display = 'none';
            } else {
                agariBtn.style.display = 'block';
            }
        }

        // アガリモーダルを表示
        function showAgariModal() {
            document.getElementById('agariOverlay').style.display = 'flex';
        }

        // アガリモーダルを閉じる
        function closeAgariModal() {
            document.getElementById('agariOverlay').style.display = 'none';
            // 盤面リセットなどの処理をここに挟めます
            alert('次の局に進みます（デモ）');
            location.reload(); // デモなので再読み込みで初期化
        }
    </script>
</body>
</html>
